services:
  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
      lore-server:
        condition: service_started
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/lorehub
      LORE_SERVER_URL: http://lore-server:8081
      LORE_JWT_SECRET: local-development-secret-change-me
      PORT: 8080
    ports:
      - "8080:8080"

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      lore-server:
        condition: service_started
    environment:
      LORE_SERVER_URL: http://lore-server:8081

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    depends_on:
      api:
        condition: service_started
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: lorehub
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lorehub"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_PASSWORD: lorehubminio
      MINIO_ROOT_USER: lorehub
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  # Override LORE_SERVER_IMAGE if you publish a different lore-server image.
  lore-server:
    image: ${LORE_SERVER_IMAGE:-ghcr.io/epicgames/lore-server:latest}
    ports:
      - "8081:8081"

volumes:
  minio-data:
  postgres-data:
