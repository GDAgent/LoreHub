services:
  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/lorehub
      # LORE_BACKEND=fake uses the in-process conformance-tested fake so the
      # stack boots without a published lore-server. Set to "http" and start the
      # lore profile (docker compose --profile lore up) for real Lore ops.
      LORE_BACKEND: ${LORE_BACKEND:-fake}
      LORE_SERVER_URL: http://lore-server:8081
      LORE_JWT_SECRET: ${LORE_JWT_SECRET:-local-development-secret-change-me}
      PORT: 8080
    ports:
      - "8080:8080"

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/lorehub
      REDIS_URL: redis://redis:6379
      LORE_BACKEND: ${LORE_BACKEND:-fake}
      LORE_SERVER_URL: http://lore-server:8081

  web:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.web
    depends_on:
      api:
        condition: service_started
    environment:
      PORT: 3000
      NEXT_PUBLIC_API_BASE_URL: http://localhost:8080
    ports:
      - "3000:3000"

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: lorehub
      POSTGRES_PASSWORD: postgres
      POSTGRES_USER: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d lorehub"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:8-alpine
    ports:
      - "6379:6379"

  minio:
    image: minio/minio:RELEASE.2025-02-18T16-25-55Z
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_PASSWORD: lorehubminio
      MINIO_ROOT_USER: lorehub
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio-data:/data

  # Optional: a real lore-server. Not started by default (no public image yet).
  # Enable with `docker compose --profile lore up` and set LORE_BACKEND=http.
  # Override LORE_SERVER_IMAGE to point at your own build.
  lore-server:
    image: ${LORE_SERVER_IMAGE:-ghcr.io/epicgames/lore-server:latest}
    profiles: ["lore"]
    ports:
      - "8081:8081"

volumes:
  minio-data:
  postgres-data:
